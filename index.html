<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwx1LCnIKw9qZlb2G2cJI4EW9QtA6rk1bk24lLAmwvChh2LXwaDXCKOelfuc59y2WsAZA/exec";
    
    let currentMonth = new Date();
    let checkoutDates = [];
    let allMemos = {}; 

    async function init() {
        // 순서: 캘린더 가져오고 -> 메모 가져오고 -> 달력 그리기
        await fetchCalendar();
        await fetchMemos();
        renderCalendar();
    }

    async function fetchCalendar() {
        try {
            const res = await fetch('/api/calendar');
            checkoutDates = await res.json();
            document.getElementById('status-text').innerText = "✅ 혜빈님, 실시간 동기화 완료";
        } catch (e) {
            document.getElementById('status-text').innerText = "⚠️ 연동 확인 필요";
        }
    }

    async function fetchMemos() {
        try {
            const res = await fetch(WEB_APP_URL);
            allMemos = await res.json();
            console.log("가져온 메모들:", allMemos); // 확인용
        } catch (e) {
            console.error("메모 로드 실패", e);
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('month-title');
        grid.innerHTML = '';
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        title.innerText = `${year}년 ${month + 1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for (let d = 1; d <= lastDate; d++) {
            // 시트와 똑같은 '2026-04-12' 형식으로 날짜를 만듭니다.
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isCheckout = checkoutDates.includes(dateStr);
            const memoContent = allMemos[dateStr]; // 시트에서 가져온 메모가 있는지 확인
            
            const dayEl = document.createElement('div');
            dayEl.className = `relative h-16 flex items-center justify-center rounded-2xl shadow-sm text-lg font-bold cursor-pointer transition-all ${isCheckout ? 'bg-orange-500 text-white scale-105 z-10 shadow-lg' : 'bg-white text-gray-700'}`;
            
            dayEl.innerHTML = `
                <div class="flex flex-col items-center">
                    <span>${d}</span>
                    ${isCheckout ? '<span class="checkout-badge">CHECKOUT</span>' : ''}
                    ${memoContent ? '<div class="w-1.5 h-1.5 bg-orange-300 rounded-full mt-0.5"></div>' : ''}
                </div>
            `;
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
    }

    let selectedDate = "";
    function openModal(dateStr) {
        selectedDate = dateStr;
        const parts = dateStr.split('-');
        document.getElementById('memo-date').innerText = `${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
        
        // 메모창을 열 때 시트에서 가져온 값이 있으면 보여줍니다.
        document.getElementById('memo-input').value = allMemos[dateStr] || "";
        document.getElementById('memo-modal').classList.remove('hidden');
    }

    async function saveMemo() {
        const content = document.getElementById('memo-input').value;
        const btn = document.getElementById('save-btn');
        const loader = document.getElementById('save-loader');
        
        btn.disabled = true;
        loader.classList.remove('hidden');

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ date: selectedDate, content: content })
            });
            allMemos[selectedDate] = content; // 저장 후 즉시 기억하기
            renderCalendar();
            closeModal();
        } catch (e) {
            alert("저장 실패! 다시 시도해주세요.");
        } finally {
            btn.disabled = false;
            loader.classList.add('hidden');
        }
    }

    function closeModal() {
        document.getElementById('memo-modal').classList.add('hidden');
    }

    function changeMonth(diff) {
        currentMonth.setMonth(currentMonth.getMonth() + diff);
        // 달 이동할 때마다 메모 다시 확인
        init(); 
    }

    init();
</script>
