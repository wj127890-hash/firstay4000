<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firstay 1000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        .checkout-badge { font-size: 8px; font-weight: 900; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-10">
        <div class="bg-orange-600 text-white p-10 rounded-b-[40px] shadow-lg text-center">
            <div class="flex justify-between items-center px-4">
                <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left text-2xl"></i></button>
                <h2 id="month-title" class="text-3xl font-black">2026년 4월</h2>
                <button onclick="changeMonth(1)"><i class="fas fa-chevron-right text-2xl"></i></button>
            </div>
            <p id="status-text" class="mt-2 text-orange-200 text-xs font-bold tracking-widest italic">데이터 동기화 중...</p>
        </div>
        <div class="p-6">
            <div class="grid grid-cols-7 mb-6 text-center text-xs font-black text-gray-400">
                <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
        </div>
        <div id="memo-modal" class="fixed inset-0 bg-black/70 hidden flex items-end z-50">
            <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="memo-date" class="text-2xl font-bold">날짜 메모</h3>
                    <button onclick="closeModal()" class="text-3xl">&times;</button>
                </div>
                <p class="text-orange-600 font-black mb-2 italic text-sm">"혜빈님께 전달드립니다"</p>
                <textarea id="memo-input" class="w-full h-48 p-5 border-2 border-orange-100 rounded-[25px] outline-none focus:border-orange-500 text-lg shadow-inner" placeholder="내용을 입력하세요."></textarea>
                <button onclick="closeModal()" class="w-full bg-orange-600 text-white font-black py-5 rounded-[25px] mt-6 text-xl shadow-lg">저장하기</button>
            </div>
        </div>
    </div>
    <script>
        let currentMonth = new Date();
        let checkoutDates = [];
        async function fetchCalendar() {
            try {
                const res = await fetch('/api/calendar');
                const icsText = await res.text();
                checkoutDates = [];
                const lines = icsText.split(/\r?\n/);
                lines.forEach(line => {
                    if (line.includes('DTEND') || line.includes('DTSTART')) {
                        const match = line.match(/\d{8}/);
                        if (match) {
                            const s = match[0];
                            checkoutDates.push(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`);
                        }
                    }
                });
                document.getElementById('status-text').innerText = "✅ 실시간 자동 연동 성공";
                renderCalendar();
            } catch (e) {
                document.getElementById('status-text').innerText = "⚠️ 연동 확인 필요";
                renderCalendar();
            }
        }
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('month-title');
            grid.innerHTML = '';
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            title.innerText = `${year}년 ${month + 1}월`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isCheckout = checkoutDates.includes(dateStr);
                const dayEl = document.createElement('div');
                dayEl.className = `relative h-16 flex items-center justify-center rounded-2xl shadow-sm text-lg font-bold cursor-pointer transition-all ${isCheckout ? 'bg-orange-500 text-white scale-105 z-10 shadow-lg' : 'bg-white text-gray-700'}`;
                dayEl.innerHTML = `<div class="flex flex-col items-center"><span>${d}</span>${isCheckout ? '<span class="checkout-badge">CHECKOUT</span>' : ''}</div>`;
                dayEl.onclick = () => openModal(month + 1, d);
                grid.appendChild(dayEl);
            }
        }
        function changeMonth(diff) { currentMonth.setMonth(currentMonth.getMonth() + diff); renderCalendar(); }
        function openModal(m, d) { document.getElementById('memo-date').innerText = `${m}월 ${d}일`; document.getElementById('memo-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('memo-modal').classList.add('hidden'); }
        fetchCalendar();
    </script>
</body>
</html>
