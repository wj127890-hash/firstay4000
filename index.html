<script>
    let currentMonth = new Date(); // 현재 달력의 기준 날짜
    let checkoutDates = [];       // 서버에서 받아올 체크아웃 날짜 리스트

    // 1. 서버(api/calendar.js)에서 날짜 데이터 가져오기
    async function fetchCalendar() {
        try {
            // 우리가 만든 서버 통로에 물어봅니다
            const res = await fetch('/api/calendar');
            // 서버가 보내준 날짜 배열([ "2026-04-07", "2026-04-09" ... ])을 받습니다
            checkoutDates = await res.json(); 
            
            document.getElementById('status-text').innerText = "✅ 혜빈님, 모든 예약 연동 완료!";
            renderCalendar(); // 데이터를 다 받았으니 달력을 그립니다
        } catch (e) {
            console.error("데이터 로드 실패:", e);
            document.getElementById('status-text').innerText = "⚠️ 연동 확인 필요";
            renderCalendar();
        }
    }

    // 2. 화면에 달력 그리기
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('month-title');
        grid.innerHTML = '';
        
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        title.innerText = `${year}년 ${month + 1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        // 달력 앞부분 빈칸 만들기
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        // 날짜 칸 만들기
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isCheckout = checkoutDates.includes(dateStr);
            
            const dayEl = document.createElement('div');
            // 주황색 버튼 스타일링
            dayEl.className = `relative h-16 flex items-center justify-center rounded-2xl shadow-sm text-lg font-bold cursor-pointer transition-all ${isCheckout ? 'bg-orange-500 text-white scale-105 z-10 shadow-lg' : 'bg-white text-gray-700'}`;
            
            dayEl.innerHTML = `
                <div class="flex flex-col items-center">
                    <span>${d}</span>
                    ${isCheckout ? '<span class="checkout-badge">CHECKOUT</span>' : ''}
                </div>
            `;
            
            // 날짜 클릭하면 메모장 열기
            dayEl.onclick = () => openModal(month + 1, d);
            grid.appendChild(dayEl);
        }
    }

    // 3. 달 이동하기 (화살표 버튼)
    function changeMonth(diff) {
        currentMonth.setMonth(currentMonth.getMonth() + diff);
        renderCalendar();
    }

    // 4. 메모장 열고 닫기
    function openModal(m, d) {
        document.getElementById('memo-date').innerText = `${m}월 ${d}일`;
        document.getElementById('memo-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('memo-modal').classList.add('hidden');
    }

    // 앱이 켜지자마자 실행!
    fetchCalendar();
</script>
